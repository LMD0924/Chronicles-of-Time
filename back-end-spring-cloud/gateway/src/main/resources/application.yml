server:
  port: 8500

spring:
  application:
    name: gateway

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-center
              uri: http://localhost:8080
              predicates:
                - Path=/api/auth/**,/api/user/**,/api/admin/**
              # 不加 filters，保留完整路径
            - id: file-upload-service
              uri: http://localhost:8090
              predicates:
                - Path=/api/upload/**
              filters:
                - StripPrefix=0

# JWT 配置
jwt:
  secret: mySecretKeyForJWTGenerationWithEnoughLength12345678
  expiration: 3600000

# 白名单
auth:
  white-list:
    - /api/auth/login
    - /api/auth/refresh
    - /actuator/health

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.example.gateway: DEBUG