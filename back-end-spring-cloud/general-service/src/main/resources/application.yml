spring:
  application:
    name: general-service

  datasource:
    dynamic:
      primary: chroniclesoftime
      strict: false
      datasource:
        chroniclesoftime:
          url: jdbc:mysql://localhost:3306/chroniclesoftime?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
          username: root
          password: 0924
          driver-class-name: com.mysql.cj.jdbc.Driver
        futurestack:
          url: jdbc:mysql://localhost:3306/futurestack?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
          username: root
          password: 0924
          driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8084

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 认证中心地址
auth:
  center:
    url: http://localhost:8080

# 关闭数据源健康检查
management:
  health:
    db:
      enabled: false